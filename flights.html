<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Details — Amy Cate</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f7; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; color: #1a1a1a; }
  .page-header { background: #1a1a1a; padding: 18px 24px; text-align: center; }
  .page-header .logo { color: #c9a96e; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.04em; }
  .page-header .sub { color: #888; font-size: 0.85rem; margin-top: 4px; }
  main { max-width: 620px; margin: 0 auto; padding: 24px 16px 60px; }
  .card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .card-title { font-size: 1rem; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
  .card-intro { font-size: .9rem; color: #555; line-height: 1.5; }
  .section-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .07em; font-weight: 700; margin: 18px 0 10px; padding-bottom: 5px; border-bottom: 2px solid #e0e0e0; }
  .section-label.arr { color: #2a5a8a; border-bottom-color: #b0c8e0; }
  .section-label.dept { color: #8a5a2a; border-bottom-color: #d0c890; }
  .person-block { border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .person-block.arr { background: #e8f0f8; border: 1px solid #b0c8e0; }
  .person-block.dept { background: #f0f0e8; border: 1px solid #d0c890; }
  .person-name { font-size: .9rem; font-weight: 700; margin-bottom: 12px; color: #1a1a1a; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group label { display: block; font-size: .82rem; font-weight: 600; color: #444; margin-bottom: 5px; }
  .form-group input { width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 7px; font-size: .95rem; color: #1a1a1a; background: white; font-family: inherit; }
  .form-group input:focus { outline: none; border-color: #c9a96e; box-shadow: 0 0 0 2px rgba(201,169,110,.15); }
  .submit-btn { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: .02em; }
  .submit-btn:hover { background: #333; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
  .loading-screen, .success-screen, .error-screen { text-align: center; padding: 60px 20px; color: #888; }
  .success-screen h2 { color: #2a7a4a; font-size: 1.4rem; margin-bottom: 10px; }
  .error-screen h2 { color: #8a1a1a; margin-bottom: 10px; }
  .spinner { width: 36px; height: 36px; border: 3px solid #eee; border-top-color: #c9a96e; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } main { padding: 16px 12px 40px; } }
</style>
</head>
<body>
<div class="page-header">
  <div class="logo">✦ Flight Details</div>
  <div class="sub">Amy Cate · Destination Weddings</div>
</div>
<main>
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <p>Loading your trip details…</p>
  </div>
  <div id="errorScreen" class="error-screen" style="display:none">
    <h2>Link not found</h2>
    <p>This link may be invalid or expired.</p>
    <p style="margin-top:12px"><a href="mailto:amy.cate@destinationweddings.com" style="color:#c9a96e">amy.cate@destinationweddings.com</a></p>
  </div>
  <div id="successScreen" class="success-screen" style="display:none">
    <div style="font-size:3rem;margin-bottom:16px">✈️</div>
    <h2>Flight Info Submitted!</h2>
    <p>Thank you! Amy will be in touch with your transfer details.</p>
    <p style="margin-top:12px;font-size:.9rem;color:#aaa">You can close this page.</p>
  </div>
  <div id="formContent" style="display:none"></div>
</main>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAlYgdkcl7ZuRL2pXJ7BObGuQyxMdVH4Js",
  authDomain: "wedding-crm-e5d12.firebaseapp.com",
  projectId: "wedding-crm-e5d12",
  storageBucket: "wedding-crm-e5d12.firebasestorage.app",
  messagingSenderId: "246819649586",
  appId: "1:246819649586:web:a74debd217ce048d26242b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function show(id){ const el=document.getElementById(id); if(el) el.style.display=''; }
function hide(id){ const el=document.getElementById(id); if(el) el.style.display='none'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const params    = new URLSearchParams(window.location.search);
const weddingId = params.get('w');
const guestId   = params.get('guest');

// Stored after load for use in submitFlight
let _personCount = 0;
let _existingFlightId = '';

async function init(){
  if(!weddingId || !guestId){ showError('Missing link parameters.'); return; }
  try{
    const [gSnap, fQuery, wSnap] = await Promise.all([
      db.collection('guests').doc(guestId).get(),
      db.collection('flights').where('weddingId','==',weddingId).where('guestId','==',guestId).get(),
      db.collection('weddings').doc(weddingId).get()
    ]);
    if(!gSnap.exists){ showError('Guest not found.'); return; }
    const guest   = { id: gSnap.id,  ...gSnap.data() };
    const wedding = wSnap.exists ? { id: wSnap.id, ...wSnap.data() } : {};
    const flightDoc = fQuery.empty ? null : { id: fQuery.docs[0].id, ...fQuery.docs[0].data() };
    renderForm(guest, wedding, flightDoc);
  } catch(e){
    console.error(e);
    showError('Could not load your trip details.');
  }
}

function showError(msg){
  hide('loadingScreen');
  const el = document.getElementById('errorScreen');
  if(msg) el.querySelector('p').textContent = msg;
  show('errorScreen');
}

function getPersons(guest){
  const persons = [guest.names || guest.name || 'Guest'];
  if(guest.additional){
    guest.additional.split(',').forEach(a=>{ if(a.trim()) persons.push(a.trim()); });
  }
  return persons;
}

function renderForm(guest, wedding, flightDoc){
  hide('loadingScreen');

  const persons = getPersons(guest);
  _personCount = persons.length;
  _existingFlightId = flightDoc?.id || '';

  let arrPersons = [], deptPersons = [];
  try{ arrPersons  = flightDoc?.personsArr  ? JSON.parse(flightDoc.personsArr)  : []; }catch(e){}
  try{ deptPersons = flightDoc?.personsDept ? JSON.parse(flightDoc.personsDept) : []; }catch(e){}

  // Default dates from guest reservation if no flight data yet
  const defaultArrDate  = guest.depart || '';
  const defaultDeptDate = guest.return  || '';

  let html = `
    <div class="card">
      <div class="card-title">✈ ${esc(wedding.names||'')} Wedding — Flight Info</div>
      <p class="card-intro">Hi <strong>${esc(guest.names||guest.name||'')}</strong>! Please fill in your flight details below so Amy can arrange your ground transportation.</p>
    </div>`;

  // ── ARRIVALS ──
  html += `<div class="card"><div class="section-label arr">✈ Arrivals</div>`;
  persons.forEach((name, idx) => {
    const d = arrPersons[idx] || {};
    const arrDate = d.date || defaultArrDate;
    html += `
      <div class="person-block arr">
        <div class="person-name">${esc(name)}</div>
        <div class="grid-2">
          <div class="form-group">
            <label>Arrival Date</label>
            <input type="date" id="arr-${idx}-date" value="${esc(arrDate)}">
          </div>
          <div class="form-group">
            <label>Flight # (e.g. AA2345)</label>
            <input type="text" id="arr-${idx}-flight" value="${esc(d.flight||'')}" placeholder="AA2345" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label>Arrives At (time)</label>
            <input type="text" id="arr-${idx}-time" value="${esc(d.time||'')}" placeholder="e.g. 2:45 PM">
          </div>
        </div>
      </div>`;
  });
  html += `</div>`;

  // ── DEPARTURES ──
  html += `<div class="card"><div class="section-label dept">✈ Departures</div>`;
  persons.forEach((name, idx) => {
    const d = deptPersons[idx] || {};
    const deptDate = d.date || defaultDeptDate;
    html += `
      <div class="person-block dept">
        <div class="person-name">${esc(name)}</div>
        <div class="grid-2">
          <div class="form-group">
            <label>Departure Date</label>
            <input type="date" id="dept-${idx}-date" value="${esc(deptDate)}">
          </div>
          <div class="form-group">
            <label>Flight # (e.g. AA2345)</label>
            <input type="text" id="dept-${idx}-flight" value="${esc(d.flight||'')}" placeholder="AA2345" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label>Departs At (time)</label>
            <input type="text" id="dept-${idx}-time" value="${esc(d.time||'')}" placeholder="e.g. 10:00 AM">
          </div>
        </div>
      </div>`;
  });
  html += `</div>`;

  html += `<button class="submit-btn" id="submitBtn" onclick="submitFlight()">Submit My Flight Info</button>`;

  document.getElementById('formContent').innerHTML = html;
  show('formContent');
}

async function submitFlight(){
  const btn = document.getElementById('submitBtn');
  if(!btn) return;
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const arrPersons = [], deptPersons = [];
  let mainArrFlight='', mainArrDate='', mainArrTime='';
  let mainDeptFlight='', mainDeptDate='', mainDeptTime='';

  for(let i = 0; i < _personCount; i++){
    const arr = {
      flight:  (document.getElementById(`arr-${i}-flight`)?.value  || '').toUpperCase().trim(),
      date:     document.getElementById(`arr-${i}-date`)?.value    || '',
      time:     document.getElementById(`arr-${i}-time`)?.value    || '',
      airport: ''
    };
    const dept = {
      flight:  (document.getElementById(`dept-${i}-flight`)?.value || '').toUpperCase().trim(),
      date:     document.getElementById(`dept-${i}-date`)?.value   || '',
      time:     document.getElementById(`dept-${i}-time`)?.value   || '',
      airport: ''
    };
    if(i === 0){
      mainArrFlight  = arr.flight;  mainArrDate  = arr.date;  mainArrTime  = arr.time;
      mainDeptFlight = dept.flight; mainDeptDate = dept.date; mainDeptTime = dept.time;
    }
    arrPersons.push(arr);
    deptPersons.push(dept);
  }

  const data = {
    guestId, weddingId,
    arrFlight:  mainArrFlight,  arrDate:  mainArrDate,  arrTime:  mainArrTime,  arrAirport: '',
    deptFlight: mainDeptFlight, deptDate: mainDeptDate, deptTime: mainDeptTime,
    transfer: 'Not Booked',
    notes: '',
    personsArr:  JSON.stringify(arrPersons),
    personsDept: JSON.stringify(deptPersons),
    submittedAt: new Date().toISOString()
  };

  try{
    if(_existingFlightId){
      await db.collection('flights').doc(_existingFlightId).update(data);
    } else {
      data.createdAt = new Date().toISOString();
      const ref = await db.collection('flights').add(data);
      _existingFlightId = ref.id;
    }
    hide('formContent');
    show('successScreen');
  } catch(e){
    console.error('Save error:', e);
    btn.disabled = false;
    btn.textContent = 'Submit My Flight Info';
    alert('There was a problem saving. Please try again or email amy.cate@destinationweddings.com');
  }
}

init();
</script>
</body>
</html>
